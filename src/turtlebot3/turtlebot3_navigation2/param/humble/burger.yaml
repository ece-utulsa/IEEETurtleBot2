controller_server:
  ros__parameters:
    use_sim_time: False
    controller_frequency: 5.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Progress checker parameters
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.1
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1
      yaw_goal_tolerance: 0.1

    # Rotation Shim wrapper
    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      angular_dist_threshold: 0.785
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.8
      max_angular_accel: 2.5
      simulate_ahead_time: 1.0
      rotate_to_goal_heading: True

      primary_controller:
        plugin: "dwb_core::DWBLocalPlanner"
        debug_trajectory_details: True

        min_vel_x: -0.4
        min_vel_y: 0.0
        max_vel_x: 0.4
        max_vel_y: 0.0
        max_vel_theta: 2.5

        min_speed_xy: 0.0
        max_speed_xy: 0.22
        min_speed_theta: 0.5

        acc_lim_x: 2.5
        acc_lim_y: 0.0
        acc_lim_theta: 1.5
        decel_lim_x: -2.5
        decel_lim_y: 0.0
        decel_lim_theta: -2.0

        vx_samples: 20
        vy_samples: 0
        vtheta_samples: 40
        sim_time: 1.5
        linear_granularity: 0.05
        angular_granularity: 0.025
        transform_tolerance: 0.2
        xy_goal_tolerance: 0.05
        trans_stopped_velocity: 0.25
        short_circuit_trajectory_evaluation: True
        stateful: True

        critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "PreferForward"]

        BaseObstacle.scale: 0.02
        PathAlign.scale: 16.0
        PathAlign.forward_point_distance: 0.1
        GoalAlign.scale: 24.0
        GoalAlign.forward_point_distance: 0.0
        PathDist.scale: 16.0
        GoalDist.scale: 24.0
        RotateToGoal.scale: 24.0
        RotateToGoal.slowing_factor: 5.0
        RotateToGoal.lookahead_time: -1.0
        Oscillation.scale: 8.0
        Oscillation.oscillation_reset_dist: 0.10
        Oscillation.oscillation_reset_angle: 0.20
        Oscillation.x_only_threshold: 0.05
        PreferForward.scale: 2.0
        PreferForward.penalty: 1.5
